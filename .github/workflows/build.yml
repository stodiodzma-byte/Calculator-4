name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Force System Python Link
      run: |
        # هنا بنجبر السيرفر يربط الـ python3 بنسخة 3.10 بالظبط ويمسح أي رابط قديم
        sudo rm -f /usr/local/bin/python3
        sudo rm -f /usr/bin/python3
        sudo ln -s $(which python3) /usr/bin/python3
        python3 --version  # عشان نتأكد في اللوج إنه قاري 3.10

    - name: Install Buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libxml2-dev libxslt1-dev
        python3 -m pip install --upgrade pip
        python3 -m pip install --user "buildozer<1.6.0" cython virtualenv

    - name: Force License Agreement
      run: |
        sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        sed -i 's/# android.accept_sdk_license = True/android.accept_sdk_license = True/g' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy/g' buildozer.spec

    - name: Build with Buildozer
      run: |
        export PATH=$HOME/.local/bin:$PATH
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-APK
        path: bin/*.apk
        
